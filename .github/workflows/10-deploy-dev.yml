name: '10: Dev Deployment'

# Deploys to dev environment when main branch is updated
# Dev environment: zenphry-cf-worker-dev.*.workers.dev (primary: dev.zenphry.com)
# Use for SEO testing, validating features before production
# See docs/CICD.md for complete documentation

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'
      - '.idea/**'
      - '.editorconfig'
      - '.github/workflows/70-e2e-weekly.yml'
      - '.github/workflows/80-seo-audit.yml'
      - '.github/workflows/90-cleanup.yml'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  # Run quality checks first
  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/00-ci.yml
    with:
      r2_bucket: zenphry-ci-artifacts-dev
    secrets: inherit

  deploy:
    name: Deploy to dev
    needs: [quality-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Required to create commit comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node

      - name: Download build artifact from R2
        uses: ./.github/actions/r2-download
        with:
          name: build-dist
          bucket: zenphry-ci-artifacts-dev
          account-id: ${{ secrets.R2_ACCOUNT_ID }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          sha: ${{ github.sha }}
          branch-name: ${{ github.ref }}

      - name: Extract build artifact
        run: |
          tar -xzf build-dist.tar.gz
          rm build-dist.tar.gz
          echo "[OK] Build artifacts extracted from R2"
          ls -la build/

      - name: Prepare wrangler config for deployment
        run: |
          sed -e 's|main = "workers/app.ts"|main = "index.js"|' \
              -e 's|directory = "build/client"|directory = "../client"|' \
              wrangler.toml > build/server/wrangler.toml
          rm build/server/wrangler.json
          echo "[OK] Created deployment config from wrangler.toml"

      - name: Deploy to dev
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "./build/server"
          command: deploy --env dev

      - name: Comment deployment URL
        uses: actions/github-script@v7
        if: github.event_name == 'push'
        with:
          script: |
            const status = '[OK] Deployed';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} to dev: https://dev.zenphry.com\n\nCheck deployment: \`npx wrangler deployments list --env dev\``
            })
